name: CI

on:
  push:
    branches:
      - main
    tags:
      - v[0-9]+.[0-9]+.[0-9]+**
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.0.0
        with:
          go-version: 1.25.11
          cache: false
      - run: make test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.0.0
        with:
          go-version: 1.25.11
          cache: false
      - name: Install go-bindata
        run: go install github.com/go-bindata/go-bindata/...@latest
      - run: make LINUX_PACKAGE_GOARCH=amd64 build-linux
      - run: make LINUX_PACKAGE_GOARCH=arm64 build-linux
      - run: make build-win
      - run: make build-darwin
      - run: make build-bsd
      - name: Build Docker image
        run: make docker
      - name: Build k8s Docker image
        run: make docker-k8s
      - name: Smoke test images
        run: |
          version=$(make print-version)
          ./smoke_test.sh "carbon-relay-ng:${version}"
          ./smoke_test.sh "carbon-relay-ng-k8s:${version}"
      - name: Store version
        run: make print-version > build/version.txt
      - name: Upload package artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          include-hidden-files: true
          name: package-artifacts
          path: build

  # Release, runs on tags only
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Download package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: package-artifacts
          path: build
      - name: Position binary for image build context
        run: |
          cp build/bin/* .
          cp build/bin/* operations/k8s/
      - name: Compute image tags and target environment
        id: image
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -e
          short_sha="${GITHUB_SHA::7}"
          if [ "$REF_TYPE" = "tag" ]; then
            # Release: push to prod GAR with a single <version> tag.
            internal_env=prod
            version=$(cat build/version.txt)
            tags="${version}"
          elif [ "$REF_TYPE" = "branch" ] && [ "$REF_NAME" = "main" ]; then
            # Main branch: push to dev GAR with immutable main-<sha> tag.
            internal_env=dev
            tags="main-${short_sha}"
          else
            echo "Refusing to publish image for unexpected ref: type=$REF_TYPE name=$REF_NAME" >&2
            exit 1
          fi
          {
            echo "internal_env=${internal_env}"
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Push image to internal GAR
        uses: grafana/shared-workflows/actions/docker-build-push-image@c66d74df41cf4ed28a90da1d91c263f9d1609a21 # docker-build-push-image/v0.3.4
        with:
          tags: ${{ steps.image.outputs.tags }}
          context: .
          gar-environment: ${{ steps.image.outputs.internal_env }}
          gar-image: carbon-relay-ng
          push: true
          registries: gar
      - name: Push image to Docker Hub mirror staging
        uses: grafana/shared-workflows/actions/docker-build-push-image@c66d74df41cf4ed28a90da1d91c263f9d1609a21 # docker-build-push-image/v0.3.4
        with:
          tags: ${{ steps.image.outputs.tags }}
          context: .
          gar-environment: prod
          gar-image: carbon-relay-ng
          gar-repository: dockerhub-carbon-relay-ng-prod-mirror
          push: true
          registries: gar
      - name: Push k8s image to internal GAR
        uses: grafana/shared-workflows/actions/docker-build-push-image@c66d74df41cf4ed28a90da1d91c263f9d1609a21 # docker-build-push-image/v0.3.4
        with:
          tags: ${{ steps.image.outputs.tags }}
          context: operations/k8s
          gar-environment: ${{ steps.image.outputs.internal_env }}
          gar-image: carbon-relay-ng-k8s
          push: true
          registries: gar

  github_binaries:
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.0.0
        with:
          go-version: 1.25.11
          cache: false
      - name: Run goreleaser
        run: curl -sfL https://goreleaser.com/static/run | bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
